name: Release

# Hybrid release (option C): CI does the heavy build and creates a DRAFT release; the maintainer
# then signs the artifact locally with the offline key and publishes it (scripts/sign-release.sh).
# The signing key never touches CI — see SECURITY.md.
#
# Flow:  just release-prep X.Y.Z  →  git push origin main vX.Y.Z  →  (this runs)  →  just sign-release X.Y.Z

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the draft release + upload build artifacts

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build + draft release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (protoc + Tauri/WebKitGTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler pkg-config build-essential \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev librsvg2-dev \
            libxdo-dev libayatana-appindicator3-dev libssl-dev

      - name: Install Rust toolchains (pinned stable + nightly for eBPF)
        run: |
          rustup toolchain install              # pinned stable from rust-toolchain.toml
          rustup toolchain install nightly --component rust-src

      - name: Install bpf-linker + Tauri CLI
        run: |
          cargo install bpf-linker --locked
          cargo install tauri-cli --locked

      - uses: Swatinem/rust-cache@v2

      - name: Build engine + stage it for the bundle
        env:
          PROTOC: /usr/bin/protoc
        run: |
          ( cd engine/ebpf && cargo build --release )
          ( cd engine/loader && cargo build --release )
          STAGE=crates/sluice-ui/dist-engine
          mkdir -p "$STAGE"
          install -m 0755 engine/loader/target/release/sluice-engine                 "$STAGE/sluice-engine"
          install -m 0644 engine/ebpf/target/bpfel-unknown-none/release/sluice-ebpf  "$STAGE/sluice-ebpf"
          install -m 0644 engine/sluice-engine.service                               "$STAGE/sluice-engine.service"

      - name: Build the combined .deb
        env:
          PROTOC: /usr/bin/protoc
        run: ( cd crates/sluice-ui && cargo tauri build --bundles deb )

      - name: Stage artifacts + checksum
        id: stage
        run: |
          mkdir -p dist
          DEB="$(ls -t target/release/bundle/deb/*.deb | head -1)"
          cp -f "$DEB" dist/
          NAME="$(basename "$DEB")"
          ( cd dist && sha256sum "$NAME" > "$NAME.sha256" )
          echo "deb=dist/$NAME" >> "$GITHUB_OUTPUT"
          echo "sha=dist/$NAME.sha256" >> "$GITHUB_OUTPUT"

      - name: Create DRAFT release (unsigned — signed + published locally)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.stage.outputs.deb }}" "${{ steps.stage.outputs.sha }}" \
            --draft \
            --title "Sluice $VERSION" \
            --notes "See CHANGELOG.md. This release is a DRAFT until it is signed and published locally (scripts/sign-release.sh) — do not install until a .minisig is attached and it is published."
